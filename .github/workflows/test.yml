name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Network diagnostic
        run: |
          curl -v https://pypi.org
          dig pypi.org
          ping -c 4 pypi.org || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip config set global.index-url https://pypi.org/simple
          pip install -r requirements.txt || echo "Falling back to individual installs"
          pip install sqlalchemy pytest

      - name: Verify imports
        run: |
          python -c "import sqlalchemy; print(sqlalchemy.__version__)" || pip install sqlalchemy
          python -c "import pytest; print(pytest.__version__)" || pip install pytest

      - name: Compile
        run: python -m py_compile src/alphaforge/ai_brain.py

      - name: Run tests
        run: pytest -q
