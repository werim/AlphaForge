name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip config set global.index-url https://pypi.org/simple
          pip install -r requirements.txt || pip install sqlalchemy pytest

      - name: Compile
        run: python -m py_compile src/alphaforge/ai_brain.py

      - name: Run tests
        run: pytest -q