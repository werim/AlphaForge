name: Backtest

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  backtest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements if present
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install fallback CI dependencies
        run: pip install pytest pandas sqlalchemy

      - name: Run backtest
        run: python backtest_order.py --top-n 20

      - name: Print backtest summary
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import math

          try:
              import pandas as pd
          except Exception as exc:
              print(f"[summary] pandas unavailable: {exc}")
              print("[summary] Skipping CSV summary.")
              raise SystemExit(0)

          def find_csv(candidates):
              csvs = sorted(Path('.').rglob('*.csv'))
              lower_map = [(p, p.name.lower()) for p in csvs]
              for needle in candidates:
                  for path, lname in lower_map:
                      if needle in lname:
                          return path
              return None

          def safe_read_csv(path):
              try:
                  return pd.read_csv(path)
              except Exception as exc:
                  print(f"[summary] Could not read {path}: {exc}")
                  return None

          def print_distribution(df, column, label):
              if column not in df.columns:
                  print(f"- {label}: <missing column '{column}'>")
                  return
              try:
                  vc = df[column].fillna('<NA>').astype(str).value_counts(dropna=False)
              except Exception as exc:
                  print(f"- {label}: <error computing distribution: {exc}>")
                  return
              if vc.empty:
                  print(f"- {label}: <no values>")
                  return
              print(f"- {label}:")
              for k, v in vc.items():
                  print(f"  - {k}: {int(v)}")

          def first_numeric(df, names):
              for name in names:
                  if name in df.columns:
                      vals = pd.to_numeric(df[name], errors='coerce').dropna()
                      if not vals.empty:
                          return float(vals.iloc[0])
              return None

          def fmt_num(value, pct=False):
              if value is None or (isinstance(value, float) and (math.isnan(value) or math.isinf(value))):
                  return '<unavailable>'
              return f"{value:.2%}" if pct else f"{value:.6g}"

          all_csvs = sorted(Path('.').rglob('*.csv'))
          print(f"[summary] Found {len(all_csvs)} CSV file(s).")
          for p in all_csvs:
              print(f"  - {p}")

          lifecycle_path = find_csv(['lifecycle'])
          perf_path = find_csv(['performance_summary', 'performance-summary', 'performance'])

          print("\n=== Backtest Lifecycle Summary ===")
          if lifecycle_path is None:
              print("No lifecycle CSV found.")
          else:
              print(f"Source: {lifecycle_path}")
              lifecycle_df = safe_read_csv(lifecycle_path)
              if lifecycle_df is not None:
                  print(f"- total rows: {len(lifecycle_df)}")
                  if 'symbol' in lifecycle_df.columns:
                      print(f"- unique symbols: {lifecycle_df['symbol'].nunique(dropna=True)}")
                  else:
                      print("- unique symbols: <missing column 'symbol'>")

                  print_distribution(lifecycle_df, 'status_after', 'status_after distribution')
                  print_distribution(lifecycle_df, 'reject_reason', 'reject_reason distribution')

                  if 'score' in lifecycle_df.columns:
                      print(f"- score unique count: {lifecycle_df['score'].nunique(dropna=True)}")
                  else:
                      print("- score unique count: <missing column 'score'>")

                  if 'rr' in lifecycle_df.columns:
                      print(f"- rr unique count: {lifecycle_df['rr'].nunique(dropna=True)}")
                  else:
                      print("- rr unique count: <missing column 'rr'>")

                  print_distribution(lifecycle_df, 'expectancy_bucket', 'expectancy_bucket distribution')

          print("\n=== Backtest Performance Summary ===")
          if perf_path is None:
              print("No performance summary CSV found.")
          else:
              print(f"Source: {perf_path}")
              perf_df = safe_read_csv(perf_path)
              if perf_df is not None:
                  total_pnl = first_numeric(perf_df, ['total_pnl', 'pnl_total', 'pnl'])
                  win_rate = first_numeric(perf_df, ['win_rate', 'winrate'])
                  avg_rr = first_numeric(perf_df, ['avg_rr', 'average_rr'])
                  rejection_rate = first_numeric(perf_df, ['rejection_rate', 'reject_rate'])

                  print(f"- total pnl: {fmt_num(total_pnl)}")
                  print(f"- win rate: {fmt_num(win_rate, pct=True)}")
                  print(f"- avg rr: {fmt_num(avg_rr)}")
                  print(f"- rejection rate: {fmt_num(rejection_rate, pct=True)}")
          PY

      - name: Upload CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-csv-outputs
          path: |
            **/*.csv
          if-no-files-found: warn
