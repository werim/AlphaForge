name: Backtest

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  backtest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install requirements if present
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install fallback CI dependencies
        run: pip install pytest pandas sqlalchemy

      - name: Run backtest
        run: python backtest_order.py --top-n 20

      - name: Upload CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-csv-outputs
          path: |
            **/*.csv
          if-no-files-found: warn
